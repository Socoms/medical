<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="medical_korea">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Medical Korea</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    window.addEventListener('load', async function() {
      var loading = document.createElement('div');
      loading.innerHTML = `
        <style>
          body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
          }
          .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
          }
          .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
          }
          .text {
            font-family: Arial, sans-serif;
            font-size: 18px;
            color: #333;
          }
          @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }
        </style>
        <div class="loading">
          <div class="loader"></div>
          <div class="text">Loading Medical Korea...</div>
        </div>
      `;
      document.body.appendChild(loading);

      try {
        let appRunner = null;
        window.flutter_web_optimizer = true;
        
        const engineInitializer = await window.flutterLoader.loadEngine({
          serviceWorker: {
            serviceWorkerVersion: serviceWorkerVersion,
          }
        });
        
        appRunner = await engineInitializer.initializeEngine({
          renderer: 'html'
        });
        
        await appRunner.runApp();
      } catch (e) {
        console.error('Error initializing Flutter app:', e);
      }
    });
  </script>
</body>
</html>
